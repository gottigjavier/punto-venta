# render.yaml — Blueprint para deploy del backend en Render
services:
  - type: web
    name: punto-venta-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://punto-venta-seven.vercel.app
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      # PORT es inyectado automáticamente por Render
